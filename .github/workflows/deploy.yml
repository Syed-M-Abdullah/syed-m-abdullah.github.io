name: Build & Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run export:github

      - name: Add CNAME / nojekyll
        run: |
          touch dist/github/.nojekyll

      - name: Deploy to syed-m-abdullah.github.io
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          cd dist/github
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy portfolio from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${DEPLOY_TOKEN}@github.com/Syed-M-Abdullah/syed-m-abdullah.github.io.git" main
